name: Build and Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          AD36D9: ${{ secrets.AD36D9 }}
          B6CCF8: ${{ secrets.B6CCF8 }}
        run: |
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('AD36D9', '')
          meta_b = os.environ.get('B6CCF8', '')
          page = pathlib.Path('index.html')
          src = page.read_text(encoding='utf-8')
          out = src
          if meta_a:
              out = out.replace('<!-- 6d91088bcff989840bc68d9a3cd95bb464f4 -->', meta_a)
          if meta_b:
              out = out.replace('<!-- 6652297fe6cd8782bcf8fdd5 -->', meta_b)
          if out == src and (meta_a or meta_b):
              sys.exit(1)
          if out != src:
              page.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
