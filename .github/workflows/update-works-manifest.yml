name: Update Works manifest

on:
  push:
    branches: [main]
    paths:
      - "works/**"
      - "tools/update-works-manifest.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Generate manifest
        run: python tools/update-works-manifest.py
      - name: Commit manifest when changed
        run: |
          if git diff --quiet -- works-manifest.js; then
            echo "Manifest is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add works-manifest.js
          git commit -m "Update Works manifest"
          git push
